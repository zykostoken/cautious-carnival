<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Clínico | HDD Profesional</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .dashboard { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
        .dash-header h1 { font-size: 1.3rem; color: #60a5fa; }
        .dash-header h1 span { color: #f87171; font-size: 0.7rem; background: rgba(248,113,113,0.15); padding: 2px 8px; border-radius: 4px; vertical-align: middle; margin-left: 8px; }
        .back-btn { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.85rem; padding: 0.5rem 1rem; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; }
        .back-btn:hover { background: rgba(255,255,255,0.08); }

        .auth-gate { text-align:center; padding:4rem 1rem; }
        .auth-gate h2 { color:#f87171; margin-bottom:1rem; }
        .auth-gate a { color:#60a5fa; }

        .patient-selector { display:flex; gap:1rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
        .patient-selector select { background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.2); padding:0.6rem 1rem; border-radius:8px; font-size:0.9rem; min-width:300px; cursor:pointer; }
        .patient-selector select option { background:#1e293b; }
        .patient-info-bar { font-size:0.82rem; color:rgba(255,255,255,0.4); }

        .view-tabs { display:flex; gap:0.4rem; margin-bottom:1.5rem; }
        .view-tab { padding:0.5rem 1.2rem; border-radius:8px; background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.45); cursor:pointer; border:1px solid transparent; font-size:0.85rem; transition:all 0.2s; }
        .view-tab.active { background:rgba(96,165,250,0.15); color:#60a5fa; border-color:rgba(96,165,250,0.3); font-weight:600; }

        .summary-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:0.7rem; margin-bottom:1.5rem; }
        .summary-card { background:rgba(255,255,255,0.05); border-radius:10px; padding:0.9rem; text-align:center; border:1px solid rgba(255,255,255,0.07); }
        .summary-card .val { font-size:1.4rem; font-weight:700; color:#fff; }
        .summary-card .val.ok    { color:#34d399; }
        .summary-card .val.warn  { color:#fbbf24; }
        .summary-card .val.alert { color:#f87171; }
        .summary-card .lbl { font-size:0.6rem; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.5px; margin-top:0.3rem; }

        .section-title { font-size:0.78rem; color:rgba(255,255,255,0.4); margin:1.5rem 0 0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; border-left:3px solid rgba(96,165,250,0.4); padding-left:0.6rem; }

        .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
        .chart-box { background:rgba(255,255,255,0.03); border-radius:12px; padding:1rem; border:1px solid rgba(255,255,255,0.06); }
        .chart-box h3 { font-size:0.7rem; color:rgba(255,255,255,0.35); margin-bottom:0.5rem; text-transform:uppercase; letter-spacing:0.4px; }
        .chart-box canvas { max-height:200px; }
        .chart-box.wide { grid-column:1/-1; }
        .chart-box.wide canvas { max-height:160px; }

        .mood-timeline { display:flex; flex-wrap:wrap; gap:5px; padding:0.8rem; background:rgba(255,255,255,0.02); border-radius:10px; border:1px solid rgba(255,255,255,0.05); min-height:52px; align-items:center; margin-bottom:1.5rem; }
        .mood-dot { width:26px; height:26px; border-radius:50%; border:2px solid rgba(255,255,255,0.08); cursor:pointer; position:relative; transition:transform 0.15s; }
        .mood-dot:hover { transform:scale(1.4); z-index:10; }
        .mood-dot .tip { display:none; position:absolute; bottom:120%; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; padding:4px 8px; border-radius:4px; font-size:0.65rem; white-space:nowrap; z-index:20; border:1px solid rgba(255,255,255,0.1); }
        .mood-dot:hover .tip { display:block; }

        .tbl-wrap { overflow-x:auto; border-radius:10px; border:1px solid rgba(255,255,255,0.06); margin-bottom:2rem; }
        .sessions-table { width:100%; border-collapse:collapse; font-size:0.72rem; }
        .sessions-table th { text-align:left; padding:0.55rem 0.5rem; color:rgba(255,255,255,0.3); border-bottom:1px solid rgba(255,255,255,0.08); font-weight:700; text-transform:uppercase; font-size:0.6rem; letter-spacing:0.4px; white-space:nowrap; background:rgba(255,255,255,0.02); }
        .sessions-table td { padding:0.45rem 0.5rem; border-bottom:1px solid rgba(255,255,255,0.03); color:rgba(255,255,255,0.6); white-space:nowrap; }
        .sessions-table tr:hover td { background:rgba(255,255,255,0.025); }
        .ok   { color:#34d399; }
        .warn { color:#fbbf24; }
        .alert{ color:#f87171; }

        .loading { text-align:center; padding:4rem; color:rgba(255,255,255,0.35); }
        .no-data { text-align:center; padding:2.5rem; color:rgba(255,255,255,0.25); font-style:italic; }

        /* Domain panels */
        .domain-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1rem; margin-bottom:1.5rem; }
        .domain-card { background:rgba(255,255,255,0.04); border-radius:12px; padding:1rem; border:1px solid rgba(255,255,255,0.06); }
        .domain-card h4 { font-size:0.72rem; text-transform:uppercase; letter-spacing:0.5px; color:rgba(255,255,255,0.4); margin-bottom:0.6rem; }
        .domain-metric { display:flex; justify-content:space-between; align-items:center; padding:0.3rem 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:0.78rem; }
        .domain-metric:last-child { border-bottom:none; }
        .domain-metric .dm-label { color:rgba(255,255,255,0.5); }
        .domain-metric .dm-val { font-weight:700; min-width:50px; text-align:right; }
        .dm-val.ok { color:#34d399; } .dm-val.warn { color:#fbbf24; } .dm-val.alert { color:#f87171; } .dm-val.neutral { color:rgba(255,255,255,0.6); }
        .domain-badge { display:inline-block; padding:2px 6px; border-radius:4px; font-size:0.6rem; font-weight:700; margin-left:6px; }
        .badge-ok { background:rgba(52,211,153,0.15); color:#34d399; } .badge-warn { background:rgba(251,191,36,0.15); color:#fbbf24; } .badge-alert { background:rgba(248,113,113,0.15); color:#f87171; }

        @media (max-width:900px) { .charts-grid { grid-template-columns:1fr; } .domain-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="dash-header">
        <h1>Dashboard Clínico <span>SOLO PROFESIONAL</span></h1>
        <a href="/hdd/admin/" class="back-btn">← Panel Admin</a>
    </div>
    <div id="content"><div class="loading">Verificando acceso...</div></div>
</div>
<script>
const SB_URL = 'https://buzblnkpfydeheingzgn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1emJsbmtwZnlkZWhlaW5nemduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgzNTY2NDcsImV4cCI6MjA4MzkzMjY0N30.yE7r59S_FDLCoYvWJOXLPzW1E5sqyw63Kl1hZDTtBtA';
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const GAMES = {
    'lawn-mower':        { name:'Cortadora de Césped',  color:'#22c55e' },
    'medication-memory': { name:'Memoria Medicación',   color:'#3b82f6' },
    'pill-organizer':    { name:'Organizador Pastillas',color:'#f59e0b' },
    'daily-routine':     { name:'Rutina Diaria',        color:'#06b6d4' },
    'fridge-logic':      { name:'Lógica Heladera',      color:'#8b5cf6' },
    'super-market':      { name:'Supermercado',         color:'#ec4899' },
    'neuro-chef':        { name:'Neuro-Chef',           color:'#a855f7' },
};
const GC = slug => GAMES[slug]?.color || '#6b7280';
const GN = slug => GAMES[slug]?.name  || slug;

let charts = {}, state = { patients:[], patient:null, metrics:[], moods:[], view:'longitudinal', dni:'' };

/* ── AUTH ─────────────────────────────────────────────────────────────── */
(async function init() {
    const sess = localStorage.getItem('hdd_admin_session');
    if (!sess) { showAuth(); return; }
    try {
        const r = await fetch('/api/hdd/admin',{ method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ action:'verify_session', sessionToken:sess }) });
        const d = await r.json();
        if (!d.valid) throw 'invalid';
    } catch { /* offline: continuar si hay sesión guardada */ }
    await loadPatients();
})();

function showAuth() {
    document.getElementById('content').innerHTML = `<div class="auth-gate">
        <h2>Acceso restringido</h2><p>Solo profesionales autorizados.</p>
        <p style="margin-top:1rem;"><a href="/hdd/admin/">Iniciar sesión</a></p></div>`;
}

/* ── PACIENTES ────────────────────────────────────────────────────────── */
async function loadPatients() {
    const { data:pts } = await sb.from('hdd_patients').select('id, full_name, dni, created_at').order('full_name');
    state.patients = pts || [];
    if (!state.patients.length) {
        document.getElementById('content').innerHTML = '<div class="no-data">No hay pacientes registrados.</div>';
        return;
    }
    let html = `<div class="patient-selector">
        <select id="pSel"><option value="">Seleccionar paciente...</option>`;
    state.patients.forEach(p => {
        html += `<option value="${p.id}">${p.full_name||'Sin nombre'} — DNI: ${p.dni||'?'}</option>`;
    });
    html += `</select><span class="patient-info-bar" id="pBar"></span></div>
    <div class="view-tabs">
        <div class="view-tab active" id="tabLong" onclick="setView('longitudinal')">📈 Evolución longitudinal</div>
        <div class="view-tab" id="tabHoy" onclick="setView('hoy')">📅 Sesión de hoy</div>
    </div>
    <div id="dashContent"><div class="no-data">Seleccioná un paciente.</div></div>`;
    document.getElementById('content').innerHTML = html;
    document.getElementById('pSel').addEventListener('change', function(){ if(this.value) loadPatientData(this.value); });
    const urlPid = new URLSearchParams(window.location.search).get('patient_id');
    if (urlPid) { document.getElementById('pSel').value = urlPid; loadPatientData(urlPid); }
}

function setView(v) {
    state.view = v;
    document.getElementById('tabLong')?.classList.toggle('active', v==='longitudinal');
    document.getElementById('tabHoy')?.classList.toggle('active', v==='hoy');
    if (state.patient) renderDashboard();
}

/* ── CARGA DATOS ──────────────────────────────────────────────────────── */
async function loadPatientData(pid) {
    destroyCharts();
    document.getElementById('dashContent').innerHTML = '<div class="loading">Cargando datos clínicos...</div>';
    const pat = state.patients.find(p => p.id == pid);
    state.patient = pat;
    const dni = pat?.dni;
    if (!dni) { document.getElementById('dashContent').innerHTML = '<div class="no-data">Paciente sin DNI.</div>'; return; }
    state.dni = dni;
    document.getElementById('pBar').textContent = `DNI: ${dni} | Ingreso: ${pat.created_at ? new Date(pat.created_at).toLocaleDateString('es-AR') : '?'}`;

    const [metRes, moodRes] = await Promise.all([
        sb.from('hdd_game_metrics').select('*').eq('patient_dni', dni).order('created_at', { ascending: true }),
        sb.from('hdd_mood_entries').select('*').eq('patient_dni', dni).order('created_at', { ascending: true })
    ]);
    state.metrics = metRes.data || [];
    state.moods   = moodRes.data || [];
    renderDashboard();
}

/* ── RENDER DASHBOARD ─────────────────────────────────────────────────── */
function renderDashboard() {
    destroyCharts();
    const { metrics, moods, view } = state;

    const biomet   = metrics.filter(m => m.metric_type === 'session_biomet');
    const sessions = metrics.filter(m => m.metric_type === 'session_summary');
    const colorMet = metrics.filter(m => m.metric_type === 'color_eleccion');
    const today    = new Date().toISOString().slice(0,10);
    const ft = arr => arr.filter(m => (m.session_date||m.created_at||'').startsWith(today));

    const bm  = view==='hoy' ? ft(biomet)   : biomet;
    const ses = view==='hoy' ? ft(sessions)  : sessions;
    const md  = view==='hoy' ? ft(moods)     : moods;
    const cm  = view==='hoy' ? ft(colorMet)  : colorMet;

    if (!bm.length && !ses.length && !md.length) {
        document.getElementById('dashContent').innerHTML =
            `<div class="no-data">${view==='hoy'?'Sin actividad hoy.':'Sin datos registrados aún.'}<br>
            <small style="color:rgba(255,255,255,0.2)">Los datos aparecen cuando el paciente juega.</small></div>`;
        return;
    }

    /* KPIs */
    const v = (arr, key) => arr.map(m => m.metric_data?.[key]).filter(x=>x!=null&&x>0);
    const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
    const fmtAvg = (arr, dec=0) => { const a=avg(arr); return a===null?'—':a.toFixed(dec); };

    const rtVals = v(bm,'rt_mean_ms');
    const avgRT  = avg(rtVals);
    const cvVals = v(bm,'rt_cv');
    const avgCV  = avg(cvVals);
    const trRVals= v(bm,'tremor_reposo_px');
    const avgTrR = avg(trRVals);
    const trIVals= v(bm,'tremor_inicio_px');
    const avgTrI = avg(trIVals);
    const econVals=v(bm,'economia_cognitiva');
    const avgEcon= avg(econVals);
    const efVals = v(bm,'eficiencia_trayectoria');
    const avgEf  = avg(efVals);
    const totalOm = bm.reduce((a,m)=>a+(m.metric_data?.errores_omision||0),0);
    const totalCom= bm.reduce((a,m)=>a+(m.metric_data?.errores_comision||0),0);
    const totalFC = bm.reduce((a,m)=>a+(m.metric_data?.falsos_clicks||0),0);
    const totalHes= bm.reduce((a,m)=>a+(m.metric_data?.hesitaciones_count||0),0);
    const totalRect=bm.reduce((a,m)=>a+(m.metric_data?.rectificaciones_count||0),0);
    const days    = new Set(ses.map(s=>(s.session_date||s.created_at||'').slice(0,10)).filter(Boolean)).size;

    const rtCls  = avgRT===null?'':avgRT<600?'ok':avgRT<1200?'warn':'alert';
    const cvCls  = avgCV===null?'':avgCV<0.2?'ok':avgCV<0.4?'warn':'alert';
    const trCls  = avgTrR===null?'':avgTrR<2?'ok':avgTrR<5?'warn':'alert';

    let html = `<div class="summary-row">
        <div class="summary-card"><div class="val">${bm.length||ses.length}</div><div class="lbl">Sesiones</div></div>
        <div class="summary-card"><div class="val ${rtCls}">${avgRT===null?'—':Math.round(avgRT)}</div><div class="lbl">RT media ms</div></div>
        <div class="summary-card"><div class="val ${cvCls}">${avgCV===null?'—':avgCV.toFixed(2)}</div><div class="lbl">CV-TR</div></div>
        <div class="summary-card"><div class="val ${trCls}">${avgTrR===null?'—':avgTrR.toFixed(1)}</div><div class="lbl">Tremor reposo px</div></div>
        <div class="summary-card"><div class="val">${avgTrI===null?'—':avgTrI.toFixed(1)}</div><div class="lbl">Tremor inicio px</div></div>
        <div class="summary-card"><div class="val ${totalOm>0?'alert':''}">${totalOm}</div><div class="lbl">Omisiones</div></div>
        <div class="summary-card"><div class="val ${totalCom>0?'warn':''}">${totalCom}</div><div class="lbl">Comisiones</div></div>
        <div class="summary-card"><div class="val">${totalFC}</div><div class="lbl">Falsos clicks</div></div>
        <div class="summary-card"><div class="val">${totalRect}</div><div class="lbl">Rectificaciones</div></div>
        <div class="summary-card"><div class="val">${totalHes}</div><div class="lbl">Hesitaciones</div></div>
        <div class="summary-card"><div class="val">${avgEcon===null?'—':(avgEcon*100).toFixed(0)+'%'}</div><div class="lbl">Economía cog.</div></div>
        <div class="summary-card"><div class="val">${avgEf===null?'—':(avgEf*100).toFixed(0)+'%'}</div><div class="lbl">Ef. trayectoria</div></div>
        ${view==='longitudinal'?`<div class="summary-card"><div class="val">${days}</div><div class="lbl">Días activos</div></div>`:''}
        <div class="summary-card"><div class="val">${md.length+cm.length}</div><div class="lbl">Reg. color</div></div>
    </div>`;

    /* ── Timeline colores ── */
    const allColors = [
        ...md.map(m=>({ hex:m.color_hex, label:m.color_name||m.color_id||'', date:m.created_at, ctx:m.source_activity||m.context_type||'registro' })),
        ...cm.map(m=>({ hex:m.metric_data?.color_hex, label:m.metric_data?.color_id||'', date:m.created_at, ctx:m.game_slug||'juego' }))
    ].filter(c=>c.hex).sort((a,b)=>new Date(a.date)-new Date(b.date));

    html += `<div class="section-title">Selección de color — línea temporal (${allColors.length} registros)</div>
    <div class="mood-timeline">`;
    if (allColors.length) {
        allColors.forEach(c => {
            const d = new Date(c.date).toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
            html += `<div class="mood-dot" style="background:${c.hex}"><div class="tip">${d} ${c.ctx}</div></div>`;
        });
    } else {
        html += `<span style="color:rgba(255,255,255,0.2);font-size:0.8rem;">Sin registros de color</span>`;
    }
    html += `</div>`;

    /* ── Gráficos ── */
    html += `<div class="section-title">Biometría psicomotora — ${view==='hoy'?'sesión de hoy':'evolución entre sesiones'}</div>
    <div class="charts-grid">
        <div class="chart-box"><h3>Tiempo de Reacción — media ± SD (ms)</h3><canvas id="cRT"></canvas></div>
        <div class="chart-box"><h3>CV del TR (bradipsiquia vs variabilidad atencional)</h3><canvas id="cCV"></canvas></div>
        <div class="chart-box"><h3>Tremor reposo / acción / distal (px)</h3><canvas id="cTremor"></canvas></div>
        <div class="chart-box"><h3>Rigidez / Rueda dentada / Espasticidad (0–1)</h3><canvas id="cRigid"></canvas></div>
        <div class="chart-box"><h3>Hesitaciones y Rectificaciones</h3><canvas id="cHes"></canvas></div>
        <div class="chart-box"><h3>Errores: Omisión / Comisión / Falsos clicks</h3><canvas id="cErr"></canvas></div>
        <div class="chart-box"><h3>Eficiencia de trayectoria (0–1)</h3><canvas id="cEfic"></canvas></div>
        <div class="chart-box"><h3>Impulsividad / Inhibición motora</h3><canvas id="cImp"></canvas></div>
        <div class="chart-box"><h3>Economía cognitiva / Dismetría (px)</h3><canvas id="cEcon"></canvas></div>
        <div class="chart-box wide"><h3>Decaimiento de vigilancia intra-sesión (ratio 2ª/1ª mitad RT) — umbral 1.3</h3><canvas id="cVig"></canvas></div>
    </div>`;

    /* ── Dominios Neurocognitivos ── */
    html += buildDomainPanels(bm, ses);

    /* ── Tabla detalle ── */
    const sorted = ses.slice().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    html += `<div class="section-title">Detalle de sesiones (${sorted.length})</div>
    <div class="tbl-wrap"><table class="sessions-table"><thead><tr>
        <th>Fecha/Hora</th><th>Juego</th><th>Score</th>
        <th>RT med</th><th>RT±SD</th><th>CV-TR</th>
        <th>Tr.rep</th><th>Tr.acc</th><th>Tr.dis</th><th>Dismet.</th>
        <th>Rect.</th><th>Hesit.</th><th>H.dur ms</th>
        <th>Omis.</th><th>Comis.</th><th>F.Click</th><th>Persev.</th>
        <th>Ef.tray.</th><th>Impuls.</th><th>Inhib.</th><th>Econ.cog.</th>
        <th>Decaim.</th><th>Ef.obj.</th><th>Ef.plan</th><th>Seq.%</th><th>Duración</th>
    </tr></thead><tbody>`;

    sorted.forEach(s => {
        const bio = bm.find(b => b.session_id && b.session_id===s.session_id)
                 || bm.find(b => b.game_slug===s.game_slug && Math.abs(new Date(b.created_at)-new Date(s.created_at))<120000);
        const bd  = bio?.metric_data || {};
        const dt  = new Date(s.session_date||s.created_at).toLocaleString('es-AR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
        const c   = (v, lo, hi) => v==null?'':v<lo?'ok':v<hi?'warn':'alert';
        const pct = v => v!=null ? (v*100).toFixed(0)+'%' : '—';
        const dur = s.duration_seconds ? Math.round(s.duration_seconds)+'s' : (bd.duration_ms ? Math.round(bd.duration_ms/1000)+'s' : '—');
        html += `<tr>
            <td>${dt}</td>
            <td style="color:${GC(s.game_slug)}">${GN(s.game_slug)}</td>
            <td>${s.score??s.metric_value??'—'}</td>
            <td class="${c(bd.rt_mean_ms,600,1200)}">${bd.rt_mean_ms!=null?Math.round(bd.rt_mean_ms):'—'}</td>
            <td>${bd.rt_sd_ms!=null?Math.round(bd.rt_sd_ms):'—'}</td>
            <td class="${c(bd.rt_cv,0.2,0.4)}">${bd.rt_cv!=null?bd.rt_cv.toFixed(2):'—'}</td>
            <td>${bd.tremor_reposo_px!=null?bd.tremor_reposo_px.toFixed(1):'—'}</td>
            <td>${bd.tremor_inicio_px!=null?bd.tremor_inicio_px.toFixed(1):'—'}</td>
            <td>${bd.tremor_terminal_px!=null?bd.tremor_terminal_px.toFixed(1):'—'}</td>
            <td>${bd.dismetria_mean_px!=null?bd.dismetria_mean_px.toFixed(1):'—'}</td>
            <td>${bd.rectificaciones_count??'—'}</td>
            <td>${bd.hesitaciones_count??'—'}</td>
            <td>${bd.hesitacion_duracion_mean_ms!=null?Math.round(bd.hesitacion_duracion_mean_ms):'—'}</td>
            <td class="${bd.errores_omision>0?'alert':''}">${bd.errores_omision??'—'}</td>
            <td class="${bd.errores_comision>0?'warn':''}">${bd.errores_comision??'—'}</td>
            <td>${bd.falsos_clicks??'—'}</td>
            <td>${bd.perseveracion_count??'—'}</td>
            <td>${pct(bd.eficiencia_trayectoria)}</td>
            <td>${pct(bd.impulsividad_ratio)}</td>
            <td>${pct(bd.inhibicion_motor)}</td>
            <td>${pct(bd.economia_cognitiva)}</td>
            <td class="${bd.decaimiento_vigilancia>1.3?'alert':bd.decaimiento_vigilancia>1.1?'warn':''}">${bd.decaimiento_vigilancia!=null?bd.decaimiento_vigilancia.toFixed(2):'—'}</td>
            <td>${pct(bd.eficacia_objetivo)}</td>
            <td>${pct(bd.eficacia_plan_propio)}</td>
            <td>${pct(bd.secuencia_correcta_pct)}</td>
            <td>${dur}</td>
        </tr>`;
    });
    if (!sorted.length) html += `<tr><td colspan="26" class="no-data">Sin sesiones${view==='hoy'?' hoy':''}</td></tr>`;
    html += `</tbody></table></div>`;

    document.getElementById('dashContent').innerHTML = html;
    requestAnimationFrame(() => buildCharts(bm));
}

/* ── DOMINIOS NEUROCOGNITIVOS ─────────────────────────────────────────── */
function buildDomainPanels(bm, ses) {
    if (!bm.length && !ses.length) return '';
    const all = [...bm, ...ses];
    // Helper: get last N values for a metric key from metric_data
    const lastN = (arr, key, n=5) => arr.slice(-n).map(m => m.metric_data?.[key]).filter(x => x != null && !isNaN(x));
    const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
    const cls = (v, lo, hi, invert) => {
        if (v == null) return 'neutral';
        if (invert) return v < lo ? 'ok' : v < hi ? 'warn' : 'alert';
        return v > hi ? 'ok' : v > lo ? 'warn' : 'alert';
    };
    const fmt = (v, dec=2) => v != null ? v.toFixed(dec) : '—';
    const badge = c => c === 'ok' ? '<span class="domain-badge badge-ok">OK</span>' : c === 'warn' ? '<span class="domain-badge badge-warn">ATEN</span>' : c === 'alert' ? '<span class="domain-badge badge-alert">ALT</span>' : '';

    // ── MOTOR ──
    const trRep = avg(lastN(bm, 'tremor_reposo_px'));
    const trAcc = avg(lastN(bm, 'tremor_inicio_px'));
    const trDis = avg(lastN(bm, 'tremor_terminal_px'));
    const rigid = avg(lastN(bm, 'rigidez_index'));
    const cogwh = avg(lastN(bm, 'cogwheel_index'));
    const clasp = avg(lastN(bm, 'espasticidad_index'));
    const efTr  = avg(lastN(bm, 'eficiencia_trayectoria'));
    const dismt = avg(lastN(bm, 'dismetria_mean_px'));

    // ── MEMORIA ──
    const memFij = avg(lastN(all, 'memoria_fijacion_ratio').concat(lastN(all, 'fijacion_ratio')));
    const memEvo = avg(lastN(all, 'memoria_evocacion_ratio').concat(lastN(all, 'evocacion_ratio')));
    const memTra = avg(lastN(all, 'memoria_trabajo_ratio').concat(lastN(all, 'trabajo_carga_dual')));
    const memSem = avg(lastN(all, 'memoria_semantica_ratio'));
    const memSpn = avg(lastN(all, 'memory_span'));
    const primac = avg(lastN(all, 'efecto_primacia'));
    const recenc = avg(lastN(all, 'efecto_recencia'));

    // ── ATENCIÓN ──
    const rtMean = avg(lastN(bm, 'rt_mean_ms'));
    const rtCV   = avg(lastN(bm, 'rt_cv'));
    const decay  = avg(lastN(bm, 'decaimiento_vigilancia'));
    const hes    = bm.slice(-5).reduce((a,m)=>a+(m.metric_data?.hesitaciones_count||0),0);

    // ── EJECUTIVO ──
    const econ   = avg(lastN(bm, 'economia_cognitiva'));
    const impuls = avg(lastN(bm, 'impulsividad_ratio'));
    const inhib  = avg(lastN(bm, 'inhibicion_motor'));
    const persev = bm.slice(-5).reduce((a,m)=>a+(m.metric_data?.perseveracion_count||0),0);
    const planif = avg(lastN(all, 'planificacion_ratio').concat(lastN(all, 'planificacion_temporal')));

    // ── ERRORES ──
    const omis   = all.slice(-5).reduce((a,m)=>a+(m.metric_data?.errores_omision||0),0);
    const comis  = all.slice(-5).reduce((a,m)=>a+(m.metric_data?.errores_comision||0),0);
    const latenc = avg(lastN(all, 'latencia_por_accion_ms').concat(lastN(all, 'latencia_inicio_ms')));

    let html = '<div class="section-title">Dominios neurocognitivos — últimas 5 sesiones</div><div class="domain-grid">';

    // Motor
    const mCls = c => cls(c, 0.3, 0.6, true);
    html += `<div class="domain-card"><h4>Psicomotricidad ${badge(trRep!=null && trRep<2?'ok':trRep<5?'warn':'alert')}</h4>
        <div class="domain-metric"><span class="dm-label">Tremor reposo</span><span class="dm-val ${cls(trRep,2,5,true)}">${fmt(trRep,1)} px</span></div>
        <div class="domain-metric"><span class="dm-label">Tremor acción</span><span class="dm-val ${cls(trAcc,2,5,true)}">${fmt(trAcc,1)} px</span></div>
        <div class="domain-metric"><span class="dm-label">Tremor distal</span><span class="dm-val ${cls(trDis,2,5,true)}">${fmt(trDis,1)} px</span></div>
        <div class="domain-metric"><span class="dm-label">Rigidez index</span><span class="dm-val ${cls(rigid,0.3,0.6,true)}">${fmt(rigid,2)}</span></div>
        <div class="domain-metric"><span class="dm-label">Rueda dentada</span><span class="dm-val ${cls(cogwh,0.3,0.5,true)}">${fmt(cogwh,2)}</span></div>
        <div class="domain-metric"><span class="dm-label">Espasticidad</span><span class="dm-val ${cls(clasp,0.2,0.5,true)}">${fmt(clasp,2)}</span></div>
        <div class="domain-metric"><span class="dm-label">Ef. trayectoria</span><span class="dm-val ${cls(efTr,0.5,0.8,false)}">${efTr!=null?(efTr*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Dismetría</span><span class="dm-val ${cls(dismt,20,50,true)}">${fmt(dismt,1)} px</span></div>
    </div>`;

    // Memoria
    html += `<div class="domain-card"><h4>Memoria ${badge(memFij!=null && memFij>0.7?'ok':memFij>0.4?'warn':'alert')}</h4>
        <div class="domain-metric"><span class="dm-label">Fijación (encoding)</span><span class="dm-val ${cls(memFij,0.4,0.7,false)}">${memFij!=null?(memFij*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Evocación (recall)</span><span class="dm-val ${cls(memEvo,0.4,0.7,false)}">${memEvo!=null?(memEvo*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">M. de trabajo</span><span class="dm-val ${cls(memTra,0.4,0.7,false)}">${memTra!=null?(memTra*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">M. semántica</span><span class="dm-val ${cls(memSem,0.4,0.7,false)}">${memSem!=null?(memSem*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Span mnésico</span><span class="dm-val neutral">${memSpn!=null?memSpn.toFixed(1):'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Efecto primacía</span><span class="dm-val ${cls(primac,0.4,0.7,false)}">${primac!=null?(primac*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Efecto recencia</span><span class="dm-val ${cls(recenc,0.4,0.7,false)}">${recenc!=null?(recenc*100).toFixed(0)+'%':'—'}</span></div>
    </div>`;

    // Atención
    html += `<div class="domain-card"><h4>Atención ${badge(rtCV!=null && rtCV<0.2?'ok':rtCV<0.4?'warn':'alert')}</h4>
        <div class="domain-metric"><span class="dm-label">RT media</span><span class="dm-val ${cls(rtMean,600,1200,true)}">${rtMean!=null?Math.round(rtMean)+' ms':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">CV atención</span><span class="dm-val ${cls(rtCV,0.2,0.4,true)}">${fmt(rtCV,3)}</span></div>
        <div class="domain-metric"><span class="dm-label">Decaimiento vigil.</span><span class="dm-val ${cls(decay,1.1,1.3,true)}">${fmt(decay,2)}</span></div>
        <div class="domain-metric"><span class="dm-label">Hesitaciones (5ses)</span><span class="dm-val ${hes>10?'alert':hes>3?'warn':'ok'}">${hes}</span></div>
        <div class="domain-metric"><span class="dm-label">Latencia / acción</span><span class="dm-val neutral">${latenc!=null?Math.round(latenc)+' ms':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Omisiones (5ses)</span><span class="dm-val ${omis>5?'alert':omis>0?'warn':'ok'}">${omis}</span></div>
        <div class="domain-metric"><span class="dm-label">Comisiones (5ses)</span><span class="dm-val ${comis>3?'alert':comis>0?'warn':'ok'}">${comis}</span></div>
    </div>`;

    // Funciones ejecutivas
    html += `<div class="domain-card"><h4>Funciones Ejecutivas ${badge(econ!=null && econ>0.7?'ok':econ>0.4?'warn':'alert')}</h4>
        <div class="domain-metric"><span class="dm-label">Economía cognitiva</span><span class="dm-val ${cls(econ,0.4,0.7,false)}">${econ!=null?(econ*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Impulsividad</span><span class="dm-val ${cls(impuls,0.05,0.15,true)}">${impuls!=null?(impuls*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Inhibición motora</span><span class="dm-val ${cls(inhib,0.1,0.3,true)}">${inhib!=null?(inhib*100).toFixed(0)+'%':'—'}</span></div>
        <div class="domain-metric"><span class="dm-label">Perseveraciones (5ses)</span><span class="dm-val ${persev>5?'alert':persev>0?'warn':'ok'}">${persev}</span></div>
        <div class="domain-metric"><span class="dm-label">Planificación</span><span class="dm-val ${cls(planif,0.4,0.7,false)}">${planif!=null?(planif*100).toFixed(0)+'%':'—'}</span></div>
    </div>`;

    html += '</div>';
    return html;
}

/* ── GRÁFICOS ─────────────────────────────────────────────────────────── */
function buildCharts(bm) {
    if (!bm.length) return;
    const sorted = bm.slice().sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const lbl = sorted.map(m => new Date(m.session_date||m.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}));
    const d = (m,k) => m.metric_data?.[k]??null;

    const baseOpts = (extra={}) => ({
        responsive:true, animation:{duration:300},
        plugins:{ legend:{ labels:{ color:'rgba(255,255,255,0.4)', font:{size:9}, boxWidth:10, padding:6 } } },
        scales:{
            x:{ ticks:{color:'rgba(255,255,255,0.28)',font:{size:8},maxRotation:30}, grid:{color:'rgba(255,255,255,0.04)'} },
            y:{ ticks:{color:'rgba(255,255,255,0.28)',font:{size:8}}, grid:{color:'rgba(255,255,255,0.06)'} }
        }, ...extra
    });

    mkL('cRT', lbl, [
        { label:'RT media ms', data:sorted.map(m=>d(m,'rt_mean_ms')), borderColor:'#60a5fa', tension:0.3, spanGaps:true, pointRadius:4 },
        { label:'±SD',         data:sorted.map(m=>d(m,'rt_sd_ms')),  borderColor:'rgba(96,165,250,0.3)', tension:0.3, spanGaps:true, pointRadius:2, borderDash:[4,3] }
    ], baseOpts());

    mkL('cCV', lbl, [
        { label:'CV-TR', data:sorted.map(m=>d(m,'rt_cv')), borderColor:'#f59e0b', tension:0.3, spanGaps:true, pointRadius:4,
          segment:{ borderColor: ctx => ctx.p0.parsed.y>0.4?'#ef4444':ctx.p0.parsed.y>0.2?'#f59e0b':'#34d399' } }
    ], baseOpts({ scales:{ x:baseOpts().scales.x, y:{ ...baseOpts().scales.y, min:0,
        title:{ display:true, text:'CV (>0.4 = irreg. atencional  <0.2 = bradipsiquia)', color:'rgba(255,255,255,0.25)', font:{size:8} } } } }));

    mkL('cTremor', lbl, [
        { label:'Reposo',  data:sorted.map(m=>d(m,'tremor_reposo_px')),  borderColor:'#f87171', tension:0.3, spanGaps:true, pointRadius:3 },
        { label:'Acción',  data:sorted.map(m=>d(m,'tremor_inicio_px')),  borderColor:'#fb923c', tension:0.3, spanGaps:true, pointRadius:3 },
        { label:'Distal',  data:sorted.map(m=>d(m,'tremor_terminal_px')), borderColor:'#fbbf24', tension:0.3, spanGaps:true, pointRadius:3 }
    ], baseOpts());

    // Rigidity / Spasticity chart
    const rigidEl = document.getElementById('cRigid');
    if (rigidEl) {
        charts.cRigid = new Chart(rigidEl, { type:'line', data:{ labels:lbl, datasets:[
            { label:'Rigidez index', data:sorted.map(m=>d(m,'rigidez_index')), borderColor:'#f97316', tension:0.3, spanGaps:true, pointRadius:3 },
            { label:'Cogwheel', data:sorted.map(m=>d(m,'cogwheel_index')), borderColor:'#fb923c', tension:0.3, spanGaps:true, pointRadius:3, borderDash:[4,3] },
            { label:'Espasticidad', data:sorted.map(m=>d(m,'espasticidad_index')), borderColor:'#ef4444', tension:0.3, spanGaps:true, pointRadius:3 },
        ]}, options:baseOpts({ scales:{ x:baseOpts().scales.x, y:{ ...baseOpts().scales.y, min:0, max:1 } } }) });
    }

    mkB('cHes', lbl, [
        { label:'Hesitaciones',   data:sorted.map(m=>d(m,'hesitaciones_count')),    backgroundColor:'rgba(251,191,36,0.75)', borderRadius:3 },
        { label:'Rectificaciones',data:sorted.map(m=>d(m,'rectificaciones_count')), backgroundColor:'rgba(168,85,247,0.7)',  borderRadius:3 }
    ], baseOpts());

    mkB('cErr', lbl, [
        { label:'Omisión',  data:sorted.map(m=>d(m,'errores_omision')),  backgroundColor:'rgba(239,68,68,0.8)',   borderRadius:3 },
        { label:'Comisión', data:sorted.map(m=>d(m,'errores_comision')), backgroundColor:'rgba(245,158,11,0.75)', borderRadius:3 },
        { label:'F.Clicks', data:sorted.map(m=>d(m,'falsos_clicks')),    backgroundColor:'rgba(156,163,175,0.55)',borderRadius:3 }
    ], baseOpts());

    mkL('cEfic', lbl, [
        { label:'Ef. trayectoria', data:sorted.map(m=>d(m,'eficiencia_trayectoria')), borderColor:'#34d399', tension:0.3, spanGaps:true, pointRadius:4,
          fill:true, backgroundColor:'rgba(52,211,153,0.07)' }
    ], baseOpts({ scales:{ x:baseOpts().scales.x, y:{ ...baseOpts().scales.y, min:0, max:1 } } }));

    mkL('cImp', lbl, [
        { label:'Impulsividad', data:sorted.map(m=>d(m,'impulsividad_ratio')), borderColor:'#f87171', tension:0.3, spanGaps:true, pointRadius:3 },
        { label:'Inhib.motor',  data:sorted.map(m=>d(m,'inhibicion_motor')),   borderColor:'#a78bfa', tension:0.3, spanGaps:true, pointRadius:3 }
    ], baseOpts({ scales:{ x:baseOpts().scales.x, y:{ ...baseOpts().scales.y, min:0, max:1 } } }));

    mkL('cEcon', lbl, [
        { label:'Economía cog.', data:sorted.map(m=>d(m,'economia_cognitiva')), borderColor:'#06b6d4', tension:0.3, spanGaps:true, pointRadius:3, yAxisID:'y' },
        { label:'Dismetría px',  data:sorted.map(m=>d(m,'dismetria_mean_px')),  borderColor:'#a855f7', tension:0.3, spanGaps:true, pointRadius:3, yAxisID:'y1' }
    ], { ...baseOpts(), scales:{
        x:baseOpts().scales.x,
        y: { ticks:{color:'rgba(255,255,255,0.28)',font:{size:8}}, grid:{color:'rgba(255,255,255,0.06)'}, position:'left',  min:0, max:1 },
        y1:{ ticks:{color:'rgba(255,255,255,0.28)',font:{size:8}}, grid:{drawOnChartArea:false},           position:'right' }
    }});

    mkL('cVig', lbl, [
        { label:'Decaimiento vigilancia', data:sorted.map(m=>d(m,'decaimiento_vigilancia')), borderColor:'#f59e0b', tension:0.3, spanGaps:true, pointRadius:4,
          fill:true, backgroundColor:'rgba(245,158,11,0.05)',
          segment:{ borderColor: ctx=>ctx.p0.parsed.y>1.3?'#ef4444':'#f59e0b', pointBackgroundColor: ctx=>ctx.p0.parsed.y>1.3?'#ef4444':'#f59e0b' } }
    ], baseOpts({ scales:{ x:baseOpts().scales.x, y:{
        ...baseOpts().scales.y, min:0.5,
        title:{ display:true, text:'ratio >1.3 = fatigabilidad significativa', color:'rgba(255,255,255,0.25)', font:{size:8} }
    }}}));
}

function mkL(id, lbl, ds, opts) {
    const el = document.getElementById(id); if (!el) return;
    charts[id] = new Chart(el, { type:'line', data:{ labels:lbl, datasets:ds }, options:opts });
}
function mkB(id, lbl, ds, opts) {
    const el = document.getElementById(id); if (!el) return;
    charts[id] = new Chart(el, { type:'bar', data:{ labels:lbl, datasets:ds }, options:opts });
}
function destroyCharts() {
    Object.values(charts).forEach(c => { try { c.destroy(); } catch {} });
    charts = {};
}
</script>
