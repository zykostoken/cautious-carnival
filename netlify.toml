[build]
  publish = "."
  command = "npm install && npm run setup-db"
  environment = { SECRETS_SCAN_SMART_DETECTION_ENABLED = "true", SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY,ADMIN_EMAIL,ADMIN_PHONE" }

[functions]
  directory = "netlify/functions"

# =============================================
# SECURITY HEADERS (H-011, H-044)
# =============================================

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    X-XSS-Protection = "1; mode=block"

# =============================================
# CACHE HEADERS FOR STATIC ASSETS
# =============================================

# Cache CSS and JS files
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Cache images for 1 week
[[headers]]
  for = "/hdd/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML pages - short cache with revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# HDD Public page
[[redirects]]
  from = "/hdd"
  to = "/hdd/index.html"
  status = 200

# HDDD - Hospital de Dia Digital (standalone portal)
[[redirects]]
  from = "/HDDD"
  to = "/HDDD/index.html"
  status = 200

[[redirects]]
  from = "/hddd"
  to = "/HDDD/index.html"
  status = 200

# HDD Patient Portal
[[redirects]]
  from = "/hdd/portal"
  to = "/hdd/portal/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/hdd/portal/"
  to = "/hdd/portal/index.html"
  status = 200
  force = true

# HDD Games — redirect old path to new /games/play/ location
[[redirects]]
  from = "/hdd/portal/games/*"
  to = "/games/play/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/hdd/*"
  to = "/hdd/:splat"
  status = 200

# =============================================
# EXTERNAL GAMES PORTAL (separate from HDD)
# =============================================

# Games Login/Landing
[[redirects]]
  from = "/games"
  to = "/games/index.html"
  status = 200

# Games Portal (after auth)
[[redirects]]
  from = "/games/portal"
  to = "/games/portal/index.html"
  status = 200

# Individual Games
[[redirects]]
  from = "/games/play/*"
  to = "/games/play/:splat"
  status = 200

[[redirects]]
  from = "/games/*"
  to = "/games/:splat"
  status = 200

# Privacy policy
[[redirects]]
  from = "/privacidad"
  to = "/privacidad.html"
  status = 200

# Main SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
