[build]
  publish = "."
  command = "npm install && npm run setup-db && npm run migrate"

[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "true"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY,ADMIN_EMAIL,ADMIN_PHONE,SUPER_ADMIN_EMAILS,LIMITED_ADMIN_EMAILS"

[functions]
  directory = "netlify/functions"

# =============================================
# SECURITY HEADERS (H-011, H-044)
# =============================================

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://images.unsplash.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.daily.co https://api.mercadopago.com; frame-src 'self' https://*.daily.co; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'"

# =============================================
# CACHE HEADERS FOR STATIC ASSETS
# =============================================

# Cache CSS and JS files
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Cache images for 1 week
[[headers]]
  for = "/hdd/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML pages - short cache with revalidation
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# HDD Public page
[[redirects]]
  from = "/hdd"
  to = "/hdd/index.html"
  status = 200

# HDD Patient Portal
[[redirects]]
  from = "/hdd/portal"
  to = "/hdd/portal/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/hdd/portal/"
  to = "/hdd/portal/index.html"
  status = 200
  force = true

# HDD Admin HCE (Historia Clínica Electrónica) - legacy path
[[redirects]]
  from = "/hdd/admin/hce"
  to = "/hdd/admin/hce.html"
  status = 200
  force = true

# HCE — Historia Clínica Electrónica
# /hce → listado de pacientes, /hce/paciente → HC individual (archivo unico en /hdd/admin/hce.html)
[[redirects]]
  from = "/hce"
  to = "/hce/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/hce/paciente"
  to = "/hdd/admin/hce.html"
  status = 200
  force = true

[[redirects]]
  from = "/hce/usuarios"
  to = "/hce/usuarios.html"
  status = 200
  force = true

# HDD Games — redirect old path to new /games/play/ location
[[redirects]]
  from = "/hdd/portal/games/*"
  to = "/games/play/:splat"
  status = 301
  force = true

# =============================================
# EXTERNAL GAMES PORTAL (separate from HDD)
# =============================================

# Games Login/Landing
[[redirects]]
  from = "/games"
  to = "/games/index.html"
  status = 200

# Games Portal (after auth)
[[redirects]]
  from = "/games/portal"
  to = "/games/portal/index.html"
  status = 200

# Main SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
