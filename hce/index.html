<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=/hdd/admin/index.html#hce">
  <title>Historia Clinica Electronica - Redirigiendo...</title>
</head>
<body>
  <p>Redirigiendo a Historia Clinica Electronica...</p>
  <script>
    // Preserve patient ID if coming from old /hce/paciente?id=X links
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) {
      window.location.replace('/hdd/admin/hce?id=' + id);
    } else {
      window.location.replace('/hdd/admin/index.html#hce');
    }
  </script>
</body>
</html>
